name: Test Intake Artifact Consumer
run-name: >-
  Test artifact consumer · run=${{ github.event.workflow_run.id }}

on:
  workflow_run:
    workflows:
      - Test Intake Artifact Producer
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  consume:
    runs-on: ubuntu-slim
    env:
      GH_TOKEN: ${{ github.token }}
      RUN_ID: ${{ github.event.workflow_run.id }}
      ARTIFACT_NAME: intake-run-manifest-${{ github.event.workflow_run.id }}
    steps:
      - name: Wait for artifact to become available
        run: |
          set -euo pipefail
          attempts=12
          sleep_seconds=5
          found=""

          for i in $(seq 1 "${attempts}"); do
            found="$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts" \
              --jq ".artifacts[] | select(.name==\"${ARTIFACT_NAME}\") | .id" | head -n1 || true)"
            if [ -n "${found}" ]; then
              echo "Found artifact ${ARTIFACT_NAME} (id=${found}) on attempt ${i}/${attempts}."
              break
            fi
            echo "Artifact ${ARTIFACT_NAME} not visible yet (attempt ${i}/${attempts}), retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

          if [ -z "${found}" ]; then
            echo "Artifact ${ARTIFACT_NAME} was not found for run ${RUN_ID}."
            exit 1
          fi

      - name: Download intake manifest artifact
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: intake-run-manifest-${{ github.event.workflow_run.id }}
          path: /tmp/intake-manifest

      - name: Resolve and read intake manifest
        run: |
          set -euo pipefail

          manifest_path="/tmp/intake-manifest/intake-manifest.json"
          if [ ! -f "${manifest_path}" ]; then
            echo "Expected manifest not found at ${manifest_path}. Listing downloaded files:"
            find /tmp/intake-manifest -maxdepth 3 -type f -print || true
            exit 1
          fi

          python3 -m json.tool "${manifest_path}" >/dev/null

          echo "Resolved manifest from run ${RUN_ID}:"
          cat "${manifest_path}"
