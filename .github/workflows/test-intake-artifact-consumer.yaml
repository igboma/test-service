name: Test Intake Artifact Consumer
run-name: >-
  Test artifact consumer · run=${{ github.event.workflow_run.id }}

on:
  workflow_run:
    workflows:
      - Test Intake Artifact Producer
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  consume:
    runs-on: ubuntu-slim
    env:
      GH_TOKEN: ${{ github.token }}
      RUN_ID: ${{ github.event.workflow_run.id }}
    steps:
      - name: Wait for artifact to become available
        run: |
          set -euo pipefail
          attempts=12
          sleep_seconds=5
          found_count=0

          for i in $(seq 1 "${attempts}"); do
            found_count="$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts" --jq '.total_count' || echo 0)"
            if [ "${found_count}" -gt 0 ]; then
              echo "Found ${found_count} artifact(s) for run ${RUN_ID} on attempt ${i}/${attempts}."
              break
            fi
            echo "No artifacts visible yet for run ${RUN_ID} (attempt ${i}/${attempts}), retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

          if [ "${found_count}" -eq 0 ]; then
            echo "No artifacts found for run ${RUN_ID}."
            exit 1
          fi

      - name: Download artifacts from producer run
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          path: /tmp/intake-manifest

      - name: Resolve and read intake manifest
        run: |
          set -euo pipefail

          manifest_path="$(find /tmp/intake-manifest -type f -name 'intake-manifest.json' | head -n1 || true)"
          if [ -z "${manifest_path}" ]; then
            echo "intake-manifest.json not found. Downloaded files:"
            find /tmp/intake-manifest -maxdepth 4 -type f -print || true
            exit 1
          fi

          python3 -m json.tool "${manifest_path}" >/dev/null

          echo "Resolved manifest from run ${RUN_ID}:"
          cat "${manifest_path}"
